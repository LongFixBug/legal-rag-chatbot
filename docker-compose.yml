services:
  postgres:
    image: postgres:16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      APP_NAME: RAG Legal Assistant
      APP_VERSION: 0.2.0
      API_PREFIX: /api
      DATA_DIR: /app/data
      STORAGE_DIR: /app/.storage
      PRELOAD_SAMPLE_DATA: "true"
      EMBEDDING_DIMENSION: "1024"
      DATABASE_URL: postgresql+asyncpg://raguser:ragpass@postgres:5432/ragdb
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: legal_chunks_qwen3
      LLM_BASE_URL: http://llama-llm:8080
      LLM_MODEL: qwen2.5-7b-instruct
      EMBEDDING_BASE_URL: http://llama-embed:8080
      EMBEDDING_MODEL: qwen3-embedding-0.6b
    ports:
      - "8000:8000"
    volumes:
      - ./.storage:/app/.storage
      - ./data:/app/data

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-streamlit
    depends_on:
      - api
    command: ["uv", "run", "streamlit", "run", "streamlit_app/Home.py", "--server.address=0.0.0.0", "--server.port=8501"]
    environment:
      API_BASE_URL: http://api:8000/api
    ports:
      - "8501:8501"

  llama-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: rag-llama-llm
    profiles: ["llama"]
    command:
      [
        "-m", "/models/qwen2.5-7b-instruct-q4_k_m.gguf",
        "--host", "0.0.0.0",
        "--port", "8080",
        "-c", "4096",
        "--jinja"
      ]
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models

  llama-embed:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: rag-llama-embed
    profiles: ["llama"]
    command:
      [
        "-m", "/models/Qwen3-Embedding-0.6B-Q8_0.gguf",
        "--host", "0.0.0.0",
        "--port", "8080",
        "--embedding",
        "-c", "4096",
        "-b", "512",
        "--pooling", "cls",
        "-ub", "512",
        "--no-warmup"
      ]
    ports:
      - "8081:8080"
    volumes:
      - ./models:/models

volumes:
  postgres_data:
  qdrant_data:
